<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Agency Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
<div id="loginView" class="auth-wrap">
  <form id="loginForm" class="card shadow p-4 auth-card">
    <h4 class="mb-3">Travel Agency ERP</h4>
    <input class="form-control mb-2" name="email" placeholder="Email" value="admin@travel.local" required>
    <input class="form-control mb-3" type="password" name="password" placeholder="Password" value="admin123" required>
    <button class="btn btn-primary w-100">Sign In</button>
  </form>
</div>

<div id="appView" class="d-none">
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand">Travel Agency ERP</span>
      <div class="d-flex gap-2">
        <button id="themeBtn" class="btn btn-outline-secondary btn-sm">Toggle Theme</button>
        <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <aside class="col-lg-2 col-md-3 p-3 border-end sidebar">
        <div class="list-group" id="menu">
          <button data-view="dashboard" class="list-group-item list-group-item-action active">Dashboard</button>
          <button data-view="customers" class="list-group-item list-group-item-action">Customers</button>
          <button data-view="bookings" class="list-group-item list-group-item-action">Bookings</button>
          <button data-view="accounting" class="list-group-item list-group-item-action">Accounting</button>
          <button data-view="employees" class="list-group-item list-group-item-action">Employees</button>
          <button data-view="reports" class="list-group-item list-group-item-action">Reports</button>
          <button data-view="notifications" class="list-group-item list-group-item-action">Notifications</button>
          <button data-view="settings" class="list-group-item list-group-item-action">Settings</button>
        </div>
      </aside>

      <main class="col-lg-10 col-md-9 p-4" id="mainContent"></main>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="./js/app.js" type="module"></script>
</body>
</html>
