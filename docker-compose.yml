version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: rasel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rasel
      POSTGRES_USER: rasel
      POSTGRES_PASSWORD: rasel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rasel_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SECRET_KEY: super-secret-change-in-production
      DATABASE_URL: postgresql+psycopg://rasel:rasel@db:5432/rasel
      ENVIRONMENT: production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      PASSWORD_MIN_LENGTH: 12
      LOGIN_ATTEMPT_LIMIT: 5
      LOGIN_ATTEMPT_WINDOW_SECONDS: 300
      CORS_ORIGINS: http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rasel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
