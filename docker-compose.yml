version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: travel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travel_agency
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/02_sample.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: travel_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      JWT_SECRET: super_secure_change_me
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: travel_agency
      FRONTEND_URL: http://localhost:4000
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  mysql_data:
