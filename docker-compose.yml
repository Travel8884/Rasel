services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rasel
      POSTGRES_USER: rasel
      POSTGRES_PASSWORD: rasel
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: super-secret-change-this
      DATABASE_URL: postgresql+psycopg://rasel:rasel@db:5432/rasel
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://frontend:5173
      ENVIRONMENT: production
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
